<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header class="header">
        <nav class="nav">
            <div class="container d-flex f-direction-column a-items-center j-content-s-between md:f-direction-row">
                <img src="./images/logo.svg" alt="logo app comidas" width="120" height="32">
                <ul class="list d-flex g-2">
                    <li><a class="link" href="">Iniciar Sesión</a></li>
                    <li><a class="link" href="">Crear Cuenta</a></li>
                    <li><a class="btn-register" href="">Registrar Cuenta</a> </li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <article class="m-article d-flex a-items-center j-content-s-between container">
            <div class="hero-content">
                <h2 class="title">Encuentra y Pide comida de tu restaurante favorito</h2>
                <form class="d-flex f-direction-column g-4">
                    <label class="d-flex f-direction-column g-2">
                        RESTAURANT
                        <input type="text" name="rest" placeholder="Tacos México">
                    </label>
                    <label class="d-flex f-direction-column g-2">
                        PLATILLO
                        <input type="text" name="platillo" placeholder="Pizza, Ensalada, Hamburguesa">
                    </label>
                    <button class="btn-search">Buscar</button>
                </form>
            </div>
            <img src="./images/dibujo_repartidor.svg" alt="Repartidor" class="hero-img">
        </article>
        <section>
            <div class="container>
                <div>
                    <h3>¿Como funciona?</h3>
                    <p>Tan facil como 1, 2 y 3</p>
                </div>
                <div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
