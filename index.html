<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Comida</title>
    <link rel="stylesheet" href="index.css">
</head>

<body class="body">
    <header class="header">
        <nav class="nav">
            <div class="container d-flex f-direction-column a-items-center j-content-s-between md:f-direction-row">
                <img src="./images/logo.svg" alt="logo app comidas" width="120" height="32">
                <ul class="list d-flex a-items-center g-4">
                    <li><a class="link" href="#">Iniciar Sesión</a></li>
                    <li><a class="link" href="#">Crear Cuenta</a></li>
                    <li><a class="btn-register link" href="#">Registrar Cuenta</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <article class="m-article d-flex a-items-center j-content-s-between container">
            <div class="hero-content">
                <h2 class="title">Encuentra y Pide comida de tu restaurante favorito</h2>
                <form class="d-flex f-direction-column g-4">
                    <label class="d-flex f-direction-column g-2">
                        RESTAURANT
                        <input type="text" name="rest" placeholder="Tacos México">
                    </label>
                    <label class="d-flex f-direction-column g-2">
                        PLATILLO
                        <input type="text" name="platillo" placeholder="Pizza, Ensalada, Hamburguesa">
                    </label>
                    <button type="button" class="btn-search">Buscar</button>
                </form>
            </div>
            <img src="./images/dibujo_repartidor.svg" alt="Repartidor" class="hero-img">
        </article>

        <section class="how-it-works">
            <div class="container d-flex f-direction-column a-items-center g-4">
                <div class="text-center color-white">
                    <h3 class="title-section">¿Cómo funciona?</h3>
                    <p>tan fácil como 1, 2 y 3</p>
                </div>

                <div class="d-flex j-content-s-between g-4 steps-container">
                    <img class="step-card" src="./images/paso_1.png" alt="paso1-como funciona">
                    <img class="step-card" src="./images/paso_2.png" alt="paso2-como funciona">
                    <img class="step-card" src="./images/paso_3.png" alt="paso3-como funciona">
                </div>
            </div>
        </section>
    </main>
</body>

</html>
